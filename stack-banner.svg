<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Glassmorphism Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.06)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <!-- Card Shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" rx="16" fill="url(#bgGrad)" />
  
  <!-- Subtle Atmosphere -->
  <circle cx="150" cy="50" r="100" fill="#38BDF8" fill-opacity="0.04" />
  <circle cx="650" cy="190" r="120" fill="#1E40AF" fill-opacity="0.06" />

  <!-- Section Title -->
  <text x="400" y="40" text-anchor="middle" 
        fill="rgba(255, 255, 255, 0.3)" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="9" font-weight="600" letter-spacing="4">PRIMARY STACK</text>

  <!-- Cards Container -->
  <g transform="translate(40, 70)">
    
    <!-- React Card -->
    <g transform="translate(0, 0)">
      <rect width="165" height="130" rx="12" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" filter="url(#cardShadow)" />
      <!-- React Icon -->
      <g transform="translate(67, 30)" stroke="#F8FAFC" stroke-width="1.2" fill="none">
        <ellipse cx="15" cy="15" rx="15" ry="5.5" />
        <ellipse cx="15" cy="15" rx="15" ry="5.5" transform="rotate(60 15 15)" />
        <ellipse cx="15" cy="15" rx="15" ry="5.5" transform="rotate(120 15 15)" />
        <circle cx="15" cy="15" r="2.2" fill="#F8FAFC" />
      </g>
      <text x="82.5" y="105" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="13" font-weight="500">React</text>
    </g>

    <!-- Laravel Card -->
    <g transform="translate(185, 0)">
      <rect width="165" height="130" rx="12" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" filter="url(#cardShadow)" />
      <!-- Laravel Icon -->
      <g transform="translate(67, 30)" stroke="#F8FAFC" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4,4 L26,4 L26,26 L4,26 Z" />
        <path d="M10,10 L20,10 L20,20 L10,20 Z" />
        <path d="M15,4 L15,10" />
        <path d="M26,15 L20,15" />
      </g>
      <text x="82.5" y="105" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="13" font-weight="500">Laravel</text>
    </g>

    <!-- JavaScript Card -->
    <g transform="translate(370, 0)">
      <rect width="165" height="130" rx="12" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" filter="url(#cardShadow)" />
      <!-- JS Icon -->
      <g transform="translate(67, 30)">
        <rect x="0" y="0" width="30" height="30" rx="4" stroke="#F8FAFC" stroke-width="1.2" fill="none" />
        <text x="15" y="21" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="11" font-weight="800">JS</text>
      </g>
      <text x="82.5" y="105" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="13" font-weight="500">JavaScript</text>
    </g>

    <!-- Figma Card -->
    <g transform="translate(555, 0)">
      <rect width="165" height="130" rx="12" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" filter="url(#cardShadow)" />
      <!-- Official Figma Icon Path (Scaled and Monochromatic) -->
      <g transform="translate(72, 30) scale(0.1)">
        <path fill="#F8FAFC" d="M50 300c27.6 0 50-22.4 50-50v-50H50c-27.6 0-50 22.4-50 50s22.4 50 50 50z"/>
        <path fill="#F8FAFC" d="M0 150c0-27.6 22.4-50 50-50h50v100H50c-27.6 0-50-22.4-50-50z"/>
        <path fill="#F8FAFC" d="M0 50C0 22.4 22.4 0 50 0h50v100H50C22.4 100 0 77.6 0 50z"/>
        <path fill="#F8FAFC" d="M100 0h50c27.6 0 50 22.4 50 50s-22.4 50-50 50h-50V0z"/>
        <path fill="#F8FAFC" d="M200 150c0 27.6-22.4 50-50 50s-50-22.4-50-50 22.4-50 50-50 50 22.4 50 50z"/>
      </g>
      <text x="82.5" y="105" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="13" font-weight="500">Figma</text>
    </g>

  </g>

  <!-- Bottom Accent -->
  <rect x="360" y="225" width="80" height="3" rx="1.5" fill="rgba(255, 255, 255, 0.15)" />
</svg>
